<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Belegio · Social Image Template</title>
<style>
  :root{
    --cream:#F4F3F0; --paper:#FCFBF8; --ink:#1A1A1A;
    --green:#1F4332; --green-dark:#0F2A1F; --wheat:#E0C896;
    --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
    --mono:"Courier New",ui-monospace,monospace;
  }
  html,body{margin:0;padding:0;background:#666;}
  /* page just centers the canvas; #canvas is what you screenshot */
  .stage{min-height:100vh;display:grid;place-items:center;padding:32px;}

  #canvas{
    position:relative; overflow:hidden;
    background:var(--cream); color:var(--ink);
    font-family:var(--sans);
  }
  /* ---- formats ---- */
  body[data-format="square"]   #canvas{width:1080px;height:1080px;}
  body[data-format="portrait"] #canvas{width:1080px;height:1350px;}
  body[data-format="x"]        #canvas{width:1600px;height:900px;}

  /* ---- themes ---- */
  body[data-theme="green"] #canvas{background:var(--green-dark);color:var(--cream);}

  /* dot-grid texture */
  #canvas::before{
    content:""; position:absolute; inset:0;
    background-image:radial-gradient(rgba(26,26,26,0.05) 1.5px,transparent 1.5px);
    background-size:26px 26px; pointer-events:none;
  }
  body[data-theme="green"] #canvas::before{
    background-image:radial-gradient(rgba(244,243,240,0.07) 1.5px,transparent 1.5px);
  }

  .pad{position:absolute; inset:0; padding:96px; display:flex; flex-direction:column;}
  body[data-format="x"] .pad{padding:80px 96px;}

  .eyebrow{
    font-family:var(--mono); text-transform:uppercase;
    font-size:26px; letter-spacing:0.2em; font-weight:700;
    color:var(--green);
  }
  body[data-theme="green"] .eyebrow{color:var(--wheat);}

  .headline{
    margin:auto 0 0; font-weight:700; letter-spacing:-0.04em;
    line-height:1.02; font-size:104px; max-width:14ch; text-wrap:balance;
  }
  body[data-format="x"] .headline{font-size:88px; max-width:18ch;}
  .headline em{font-style:italic; font-weight:500; color:var(--green);}
  body[data-theme="green"] .headline em{color:var(--wheat);}

  .sub{
    margin:28px 0 0; font-size:34px; line-height:1.4; max-width:24ch;
    color:var(--ink); opacity:.82; text-wrap:pretty;
  }
  body[data-theme="green"] .sub{color:var(--cream); opacity:.85;}
  .sub:empty{display:none;}

  .foot{
    margin-top:auto; padding-top:40px;
    display:flex; align-items:center; gap:18px;
    font-family:var(--mono); font-size:24px; letter-spacing:0.06em;
    color:var(--ink); opacity:.9;
  }
  body[data-theme="green"] .foot{color:var(--cream);}
  .mark{
    width:56px; height:56px; border-radius:13px; flex:none;
    background:var(--green); color:var(--cream);
    display:grid; place-items:center;
    font-family:var(--sans); font-weight:700; font-size:34px; letter-spacing:-0.02em;
    padding-bottom:2px;
  }
  body[data-theme="green"] .mark{background:var(--wheat); color:var(--green-dark);}

  /* decorative receipt motif, top-right */
  .receipt{
    position:absolute; top:-30px; right:84px; width:170px; height:240px;
    background:var(--paper); transform:rotate(7deg);
    box-shadow:0 22px 50px rgba(10,10,10,0.18);
    font-family:var(--mono); color:#1A1A1A; opacity:.96;
  }
  body[data-format="x"] .receipt{top:-40px; right:72px; transform:rotate(8deg);}
  .receipt .edge{position:absolute;left:0;right:0;height:10px;
    background:repeating-linear-gradient(90deg,var(--paper) 0 7px,transparent 7px 10px);}
  .receipt .edge.t{top:-5px}.receipt .edge.b{bottom:-5px}
  .receipt .h{padding:18px 14px 0;font-size:11px;letter-spacing:0.2em;opacity:.6}
  .receipt .d{padding:5px 14px;font-size:11px;opacity:.4}
  .receipt .ln{margin:8px 14px 0;height:1px;background:rgba(10,10,10,.15)}
  .receipt .r{display:flex;justify-content:space-between;margin:0 14px;padding:5px 0;
    font-size:11px;opacity:.5;border-bottom:1px dashed rgba(10,10,10,.1)}
  .receipt .sum{position:absolute;left:14px;right:14px;bottom:16px;
    display:flex;justify-content:space-between;font-size:13px;font-weight:700}
</style>
</head>
<body data-format="square" data-theme="cream">
  <div class="stage">
    <div id="canvas">
      <div class="receipt" aria-hidden="true">
        <div class="edge t"></div>
        <div class="h">SUPERMARKT</div>
        <div class="d">12.05.2026 · 14:32</div>
        <div class="ln"></div>
        <div class="r"><span>▔▔▔▔▔</span><span>€ —,—</span></div>
        <div class="r"><span>▔▔▔▔▔</span><span>€ —,—</span></div>
        <div class="r"><span>▔▔▔▔▔</span><span>€ —,—</span></div>
        <div class="sum"><span>SUMME</span><span>€ 42,80</span></div>
        <div class="edge b"></div>
      </div>
      <div class="pad">
        <div class="eyebrow" id="eyebrow">BELEGIO · TIPP</div>
        <h1 class="headline" id="headline">Belege verschwinden. <em>Immer dann, wenn du sie brauchst.</em></h1>
        <p class="sub" id="sub"></p>
        <div class="foot">
          <span class="mark">B</span>
          <span id="footer">belegio.eu · Bald verfügbar</span>
        </div>
      </div>
    </div>
  </div>

<script>
  // ---- Fill here manually, OR override any field via URL params ----
  const POST = {
    format:  "square",     // square | portrait | x
    theme:   "cream",      // cream | green
    eyebrow: "BELEGIO · TIPP",
    headline:"Belege verschwinden. <em>Immer dann, wenn du sie brauchst.</em>", // wrap accent words in <em>…</em>
    sub:     "",           // optional second line; leave "" to hide
    footer:  "belegio.eu · Bald verfügbar"
  };

  const q = new URLSearchParams(location.search);
  const get = k => q.has(k) ? q.get(k) : POST[k];

  document.body.dataset.format = get("format");
  document.body.dataset.theme  = get("theme");
  document.getElementById("eyebrow").textContent  = get("eyebrow");
  document.getElementById("headline").innerHTML   = get("headline"); // allows <em>
  document.getElementById("sub").textContent       = get("sub") || "";
  document.getElementById("footer").textContent    = get("footer");
</script>
</body>
</html>
